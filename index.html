<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>welifGiea Social Membership Database</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Font -->
    <link href="https://fontsource.org/inter/400.css" rel="stylesheet">
    <link href="https://fontsource.org/inter/600.css" rel="stylesheet">
    <link href="https://fontsource.org/inter/700.css" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Custom scrollbar for tables */
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background-color: #f1f5f9; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { Users, DollarSign, FileText, LogOut, Plus, Trash2, Upload, AlertCircle, CheckCircle, Menu, X, Home, Shield, CreditCard, Info, UserPlus, Activity, BookOpen } = lucide;

        // --- Database Constants & Helpers ---
        // Simulating Payton's API / Database structure using LocalStorage
        const DB_KEYS = {
            USERS: 'welifGiea_users_v3',
            PAYMENTS: 'welifGiea_payments_v3',
            SETTINGS: 'welifGiea_settings_v3',
            CURRENT_USER: 'welifGiea_current_user_v3'
        };

        const initDB = () => {
            if (!localStorage.getItem(DB_KEYS.USERS)) {
                // Default Admin Account
                const admin = {
                    id: 1,
                    username: 'admin',
                    password: 'admin123',
                    role: 'admin',
                    fullName: 'System Administrator',
                    family: { spouse: '', father: '', mother: '', siblings: '', children: '' }
                };
                localStorage.setItem(DB_KEYS.USERS, JSON.stringify([admin]));
            }
            if (!localStorage.getItem(DB_KEYS.SETTINGS)) {
                // Default Contribution: 200 Birr
                localStorage.setItem(DB_KEYS.SETTINGS, JSON.stringify({ monthlyContribution: 200 }));
            }
            if (!localStorage.getItem(DB_KEYS.PAYMENTS)) {
                localStorage.setItem(DB_KEYS.PAYMENTS, JSON.stringify([]));
            }
        };

        // --- Reusable UI Components ---

        const Button = ({ children, onClick, variant = 'primary', className = '', type = 'button', disabled = false }) => {
            const baseStyle = "px-4 py-2.5 rounded-lg font-semibold transition-all duration-200 flex items-center justify-center gap-2 shadow-sm active:scale-95";
            const variants = {
                primary: "bg-blue-600 text-white hover:bg-blue-700 disabled:bg-blue-300 disabled:cursor-not-allowed",
                secondary: "bg-white text-gray-700 border border-gray-300 hover:bg-gray-50 disabled:bg-gray-100",
                danger: "bg-red-50 text-red-600 hover:bg-red-100 border border-red-200",
                success: "bg-green-600 text-white hover:bg-green-700"
            };
            return (
                <button type={type} onClick={onClick} className={`${baseStyle} ${variants[variant]} ${className}`} disabled={disabled}>
                    {children}
                </button>
            );
        };

        const Input = ({ label, type = "text", value, onChange, placeholder, required = false, className = "" }) => (
            <div className={`flex flex-col gap-1.5 ${className}`}>
                {label && <label className="text-xs font-bold text-gray-600 uppercase tracking-wide">{label}</label>}
                <input 
                    type={type} 
                    value={value} 
                    onChange={onChange} 
                    placeholder={placeholder}
                    required={required}
                    className="px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-white"
                />
            </div>
        );

        const Card = ({ title, children, className = "", action }) => (
            <div className={`bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden ${className}`}>
                {(title || action) && (
                    <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                        {title && <h3 className="text-lg font-bold text-gray-800">{title}</h3>}
                        {action && <div>{action}</div>}
                    </div>
                )}
                <div className="p-6">{children}</div>
            </div>
        );

        const Badge = ({ status }) => {
            const styles = {
                paid: "bg-green-100 text-green-700 border-green-200",
                late: "bg-red-100 text-red-700 border-red-200 animate-pulse",
                pending: "bg-yellow-100 text-yellow-700 border-yellow-200",
                admin: "bg-purple-100 text-purple-700 border-purple-200",
                finance: "bg-blue-100 text-blue-700 border-blue-200",
                member: "bg-gray-100 text-gray-700 border-gray-200"
            };
            return (
                <span className={`px-2.5 py-1 rounded-full text-xs font-bold border ${styles[status] || styles.member} uppercase tracking-wider`}>
                    {status}
                </span>
            );
        };

        // --- Main Application Component ---

        const App = () => {
            const [view, setView] = useState('login'); 
            const [users, setUsers] = useState([]);
            const [payments, setPayments] = useState([]);
            const [settings, setSettings] = useState({ monthlyContribution: 200 });
            const [currentUser, setCurrentUser] = useState(null);
            const [sidebarOpen, setSidebarOpen] = useState(false);

            // Initialize Data
            useEffect(() => {
                initDB();
                setUsers(JSON.parse(localStorage.getItem(DB_KEYS.USERS) || '[]'));
                setPayments(JSON.parse(localStorage.getItem(DB_KEYS.PAYMENTS) || '[]'));
                setSettings(JSON.parse(localStorage.getItem(DB_KEYS.SETTINGS) || '{}'));
                
                const storedUser = localStorage.getItem(DB_KEYS.CURRENT_USER);
                if (storedUser) {
                    setCurrentUser(JSON.parse(storedUser));
                    setView('dashboard');
                }
            }, []);

            // Persistence Helpers
            const saveUsers = (newUsers) => {
                setUsers(newUsers);
                localStorage.setItem(DB_KEYS.USERS, JSON.stringify(newUsers));
            };

            const savePayments = (newPayments) => {
                setPayments(newPayments);
                localStorage.setItem(DB_KEYS.PAYMENTS, JSON.stringify(newPayments));
            };

            const saveSettings = (newSettings) => {
                setSettings(newSettings);
                localStorage.setItem(DB_KEYS.SETTINGS, JSON.stringify(newSettings));
            };

            const handleLogin = (username, password) => {
                const user = users.find(u => u.username === username && u.password === password);
                if (user) {
                    setCurrentUser(user);
                    localStorage.setItem(DB_KEYS.CURRENT_USER, JSON.stringify(user));
                    setView('dashboard');
                } else {
                    alert("Invalid username or password");
                }
            };

            const handleLogout = () => {
                setCurrentUser(null);
                localStorage.removeItem(DB_KEYS.CURRENT_USER);
                setView('login');
            };

            // --- Sub-Views ---

            const LoginView = () => {
                const [username, setUsername] = useState('');
                const [password, setPassword] = useState('');
                const [isRegistering, setIsRegistering] = useState(false);
                const [regData, setRegData] = useState({
                    username: '', password: '', fullName: '', role: 'member',
                    spouse: '', father: '', mother: '', siblings: '', children: ''
                });

                const submitLogin = (e) => {
                    e.preventDefault();
                    handleLogin(username, password);
                };

                const submitRegister = (e) => {
                    e.preventDefault();
                    if(users.find(u => u.username === regData.username)) {
                        alert("Username already exists");
                        return;
                    }
                    const newUser = {
                        id: Date.now(),
                        username: regData.username,
                        password: regData.password,
                        role: regData.role,
                        fullName: regData.fullName,
                        family: {
                            spouse: regData.spouse,
                            father: regData.father,
                            mother: regData.mother,
                            siblings: regData.siblings,
                            children: regData.children
                        }
                    };
                    saveUsers([...users, newUser]);
                    alert("Registration successful! Please login.");
                    setIsRegistering(false);
                };

                return (
                    <div className="min-h-screen flex items-center justify-center p-4 relative overflow-hidden bg-slate-900">
                        {/* Abstract Background */}
                        <div className="absolute inset-0 z-0 opacity-40">
                             <img src="https://image.qwenlm.ai/public_source/96f041bb-0bc0-424f-94b4-e38db9e14d88/16f4f3ff1-71b6-4ed0-bbab-e40eae77ece7.png" className="w-full h-full object-cover" alt="bg" />
                        </div>
                        <div className="absolute inset-0 bg-gradient-to-br from-blue-900/90 to-slate-900/90 z-0"></div>

                        <div className="bg-white/95 backdrop-blur-md p-8 rounded-2xl shadow-2xl w-full max-w-lg z-10 fade-in border border-white/20">
                            <div className="text-center mb-8">
                                <div className="inline-flex items-center justify-center w-12 h-12 rounded-full bg-blue-100 text-blue-600 mb-4">
                                    <Users size={24} />
                                </div>
                                <h1 className="text-3xl font-extrabold text-slate-800 tracking-tight">welifGiea</h1>
                                <p className="text-slate-500 font-medium">Social Membership Database</p>
                            </div>

                            {!isRegistering ? (
                                <form onSubmit={submitLogin} className="space-y-5">
                                    <Input label="Username" value={username} onChange={e => setUsername(e.target.value)} required placeholder="Enter your username" />
                                    <Input label="Password" type="password" value={password} onChange={e => setPassword(e.target.value)} required placeholder="Enter your password" />
                                    <Button type="submit" className="w-full py-3 text-lg shadow-blue-200 shadow-lg">Sign In</Button>
                                    <div className="text-center pt-2">
                                        <button type="button" onClick={() => setIsRegistering(true)} className="text-sm text-blue-600 font-semibold hover:text-blue-700 hover:underline">Create New Member Account</button>
                                    </div>
                                </form>
                            ) : (
                                <form onSubmit={submitRegister} className="space-y-4 max-h-[65vh] overflow-y-auto pr-2 custom-scroll">
                                    <div className="flex items-center justify-between mb-2">
                                        <h3 className="font-bold text-lg text-slate-800">New Member Registration</h3>
                                        <button type="button" onClick={() => setIsRegistering(false)} className="text-gray-400 hover:text-gray-600"><X size={20}/></button>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <Input label="Username" value={regData.username} onChange={e => setRegData({...regData, username: e.target.value})} required />
                                        <Input label="Password" type="password" value={regData.password} onChange={e => setRegData({...regData, password: e.target.value})} required />
                                    </div>
                                    <Input label="Full Name" value={regData.fullName} onChange={e => setRegData({...regData, fullName: e.target.value})} required />
                                    
                                    <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 space-y-3">
                                        <p className="text-xs font-bold text-slate-500 uppercase">Family Details</p>
                                        <Input label="Spouse Name" value={regData.spouse} onChange={e => setRegData({...regData, spouse: e.target.value})} />
                                        <div className="grid grid-cols-2 gap-4">
                                            <Input label="Father's Name" value={regData.father} onChange={e => setRegData({...regData, father: e.target.value})} />
                                            <Input label="Mother's Name" value={regData.mother} onChange={e => setRegData({...regData, mother: e.target.value})} />
                                        </div>
                                        <Input label="Siblings (Names)" value={regData.siblings} onChange={e => setRegData({...regData, siblings: e.target.value})} />
                                        <Input label="Children (Names)" value={regData.children} onChange={e => setRegData({...regData, children: e.target.value})} />
                                    </div>

                                    <div className="flex gap-3 pt-2">
                                        <Button type="submit" className="flex-1">Register Member</Button>
                                        <Button variant="secondary" onClick={() => setIsRegistering(false)}>Cancel</Button>
                                    </div>
                                </form>
                            )}
                        </div>
                    </div>
                );
            };

            const DashboardView = () => {
                const totalCollected = payments.reduce((sum, p) => sum + parseFloat(p.amount), 0);
                const pendingCount = payments.filter(p => p.status === 'pending').length;
                const lateCount = payments.filter(p => p.status === 'late').length;
                const totalMembers = users.filter(u => u.role !== 'admin').length;

                return (
                    <div className="space-y-6 fade-in">
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            <Card className="border-l-4 border-l-blue-500">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-gray-500 text-sm font-semibold uppercase">Total Collected</p>
                                        <h2 className="text-3xl font-bold text-gray-800 mt-1">{totalCollected.toLocaleString()} Birr</h2>
                                    </div>
                                    <div className="p-3 bg-blue-50 rounded-full text-blue-600"><DollarSign size={24} /></div>
                                </div>
                            </Card>
                            <Card className="border-l-4 border-l-green-500">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-gray-500 text-sm font-semibold uppercase">Active Members</p>
                                        <h2 className="text-3xl font-bold text-gray-800 mt-1">{totalMembers}</h2>
                                    </div>
                                    <div className="p-3 bg-green-50 rounded-full text-green-600"><Users size={24} /></div>
                                </div>
                            </Card>
                            <Card className="border-l-4 border-l-yellow-500">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-gray-500 text-sm font-semibold uppercase">Pending Payments</p>
                                        <h2 className="text-3xl font-bold text-gray-800 mt-1">{pendingCount}</h2>
                                    </div>
                                    <div className="p-3 bg-yellow-50 rounded-full text-yellow-600"><AlertCircle size={24} /></div>
                                </div>
                            </Card>
                            <Card className="border-l-4 border-l-red-500">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-gray-500 text-sm font-semibold uppercase">Late Payments</p>
                                        <h2 className="text-3xl font-bold text-gray-800 mt-1">{lateCount}</h2>
                                    </div>
                                    <div className="p-3 bg-red-50 rounded-full text-red-600"><Activity size={24} /></div>
                                </div>
                            </Card>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <Card title="Recent Financial Activity" className="h-full">
                                <div className="overflow-x-auto custom-scroll max-h-[400px]">
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-gray-50 text-gray-600 font-bold border-b sticky top-0">
                                            <tr>
                                                <th className="p-3">Member</th>
                                                <th className="p-3">Amount</th>
                                                <th className="p-3">Date</th>
                                                <th className="p-3">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {payments.slice(-10).reverse().map(p => {
                                                const member = users.find(u => u.id === p.userId);
                                                return (
                                                    <tr key={p.id} className={`hover:bg-gray-50 transition-colors ${p.status === 'late' ? 'bg-red-50/50' : ''}`}>
                                                        <td className="p-3 font-medium text-gray-700">{member?.fullName || 'Unknown'}</td>
                                                        <td className="p-3 text-gray-600">{p.amount} Birr</td>
                                                        <td className="p-3 text-gray-500">{p.date}</td>
                                                        <td className="p-3"><Badge status={p.status} /></td>
                                                    </tr>
                                                );
                                            })}
                                            {payments.length === 0 && <tr><td colSpan="4" className="p-8 text-center text-gray-400">No financial activity recorded yet.</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </Card>

                            <Card title="System Overview" className="h-full">
                                <div className="space-y-6">
                                    <div className="flex items-center justify-between p-5 bg-gradient-to-r from-blue-50 to-white rounded-xl border border-blue-100">
                                        <div>
                                            <p className="font-bold text-gray-800 text-lg">Monthly Contribution</p>
                                            <p className="text-sm text-gray-500">Set by Finance Collector</p>
                                        </div>
                                        <div className="text-2xl font-black text-blue-600">{settings.monthlyContribution} Birr</div>
                                    </div>
                                    
                                    <div className="bg-slate-50 p-5 rounded-xl border border-slate-200">
                                        <h4 className="font-bold text-slate-700 mb-2 flex items-center gap-2"><Info size={18}/> Welcome to welifGiea</h4>
                                        <p className="text-sm text-slate-600 leading-relaxed">
                                            This database manages social membership and financial contributions. 
                                            Use the sidebar to navigate. Finance collectors can update contribution amounts and record payments. 
                                            Admins can manage user accounts.
                                        </p>
                                    </div>
                                </div>
                            </Card>
                        </div>
                    </div>
                );
            };

            const MemberRegisterView = () => {
                const [formData, setFormData] = useState({
                    username: '', password: '', fullName: '', role: 'member',
                    spouse: '', father: '', mother: '', siblings: '', children: ''
                });

                const handleSubmit = (e) => {
                    e.preventDefault();
                    if(users.find(u => u.username === formData.username)) {
                        alert("Username taken");
                        return;
                    }
                    const newUser = {
                        id: Date.now(),
                        ...formData,
                        family: {
                            spouse: formData.spouse, father: formData.father, mother: formData.mother,
                            siblings: formData.siblings, children: formData.children
                        }
                    };
                    saveUsers([...users, newUser]);
                    alert("Member Registered Successfully");
                    setFormData({ username: '', password: '', fullName: '', role: 'member', spouse: '', father: '', mother: '', siblings: '', children: '' });
                };

                return (
                    <div className="max-w-4xl mx-auto fade-in">
                        <Card title="Register New Member & Family" action={<Badge status="admin"/>}>
                            <form onSubmit={handleSubmit} className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="md:col-span-2 border-b pb-2 mb-2 flex items-center gap-2">
                                    <UserPlus className="text-blue-600" size={20}/>
                                    <h4 className="font-bold text-blue-800">Account Credentials</h4>
                                </div>
                                <Input label="Username" value={formData.username} onChange={e => setFormData({...formData, username: e.target.value})} required />
                                <Input label="Password" type="password" value={formData.password} onChange={e => setFormData({...formData, password: e.target.value})} required />
                                <Input label="Full Name" value={formData.fullName} onChange={e => setFormData({...formData, fullName: e.target.value})} required />
                                <div className="flex flex-col gap-1.5">
                                    <label className="text-xs font-bold text-gray-600 uppercase tracking-wide">Role Assignment</label>
                                    <select value={formData.role} onChange={e => setFormData({...formData, role: e.target.value})} className="px-3 py-2.5 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                                        <option value="member">Member</option>
                                        <option value="finance">Finance Collector</option>
                                        <option value="registrar">Member Registrar</option>
                                    </select>
                                </div>

                                <div className="md:col-span-2 border-b pb-2 mb-2 mt-4 flex items-center gap-2">
                                    <Users className="text-blue-600" size={20}/>
                                    <h4 className="font-bold text-blue-800">Family Information</h4>
                                </div>
                                <Input label="Spouse Name" value={formData.spouse} onChange={e => setFormData({...formData, spouse: e.target.value})} />
                                <Input label="Father's Name" value={formData.father} onChange={e => setFormData({...formData, father: e.target.value})} />
                                <Input label="Mother's Name" value={formData.mother} onChange={e => setFormData({...formData, mother: e.target.value})} />
                                <Input label="Siblings (Comma separated)" value={formData.siblings} onChange={e => setFormData({...formData, siblings: e.target.value})} />
                                <div className="md:col-span-2">
                                    <Input label="Children (Comma separated)" value={formData.children} onChange={e => setFormData({...formData, children: e.target.value})} />
                                </div>
                                
                                <div className="md:col-span-2 pt-4 flex justify-end gap-3">
                                    <Button variant="secondary" onClick={() => setFormData({ username: '', password: '', fullName: '', role: 'member', spouse: '', father: '', mother: '', siblings: '', children: '' })}>Reset</Button>
                                    <Button type="submit" className="w-full md:w-auto">Register Member</Button>
                                </div>
                            </form>
                        </Card>
                    </div>
                );
            };

            const FinanceView = () => {
                const [amount, setAmount] = useState(settings.monthlyContribution);
                const [selectedUser, setSelectedUser] = useState('');
                const [paymentStatus, setPaymentStatus] = useState('paid');
                const [receiptName, setReceiptName] = useState('');

                const updateContribution = () => {
                    saveSettings({ ...settings, monthlyContribution: parseFloat(amount) });
                    alert("Monthly contribution amount updated successfully!");
                };

                const recordPayment = (e) => {
                    e.preventDefault();
                    if(!selectedUser) return alert("Please select a member");
                    
                    const newPayment = {
                        id: Date.now(),
                        userId: parseInt(selectedUser),
                        amount: amount,
                        date: new Date().toLocaleDateString(),
                        status: paymentStatus,
                        receipt: receiptName || 'No Receipt Attached'
                    };
                    savePayments([...payments, newPayment]);
                    alert("Payment Recorded Successfully");
                    setReceiptName('');
                };

                const deletePayment = (id) => {
                    if(confirm("Are you sure you want to delete this financial record?")) {
                        savePayments(payments.filter(p => p.id !== id));
                    }
                };

                return (
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 fade-in">
                        <div className="lg:col-span-1 space-y-6">
                            <Card title="Contribution Settings">
                                <div className="space-y-4">
                                    <p className="text-sm text-gray-500">Set the standard monthly contribution amount.</p>
                                    <div className="flex gap-2">
                                        <Input type="number" value={amount} onChange={e => setAmount(e.target.value)} />
                                        <Button onClick={updateContribution}>Update</Button>
                                    </div>
                                </div>
                            </Card>
                            
                            <Card title="Record Payment">
                                <form onSubmit={recordPayment} className="space-y-5">
                                    <div className="flex flex-col gap-1.5">
                                        <label className="text-xs font-bold text-gray-600 uppercase">Select Member</label>
                                        <select value={selectedUser} onChange={e => setSelectedUser(e.target.value)} className="px-3 py-2.5 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                                            <option value="">-- Choose Member --</option>
                                            {users.filter(u => u.role !== 'admin').map(u => (
                                                <option key={u.id} value={u.id}>{u.fullName}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <Input label="Amount (Birr)" type="number" value={amount} onChange={e => setAmount(e.target.value)} />
                                    
                                    <div className="flex flex-col gap-1.5">
                                        <label className="text-xs font-bold text-gray-600 uppercase">Payment Status</label>
                                        <select value={paymentStatus} onChange={e => setPaymentStatus(e.target.value)} className="px-3 py-2.5 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                                            <option value="paid">Paid (Green)</option>
                                            <option value="late">Late (Red)</option>
                                            <option value="pending">Pending (Yellow)</option>
                                        </select>
                                    </div>

                                    <div className="flex flex-col gap-1.5">
                                        <label className="text-xs font-bold text-gray-600 uppercase">Bank Statement / Receipt</label>
                                        <div className="flex items-center gap-2 border-2 border-dashed border-gray-300 p-4 rounded-lg bg-gray-50 hover:bg-gray-100 transition-colors cursor-pointer relative">
                                            <input type="file" onChange={e => setReceiptName(e.target.files[0]?.name)} className="absolute inset-0 opacity-0 cursor-pointer" />
                                            <Upload size={20} className="text-gray-400"/>
                                            <span className="text-sm text-gray-600">{receiptName ? receiptName : 'Click to upload file'}</span>
                                        </div>
                                        {receiptName && <p className="text-xs text-green-600 flex items-center gap-1 font-medium"><CheckCircle size={12}/> File attached: {receiptName}</p>}
                                    </div>

                                    <Button type="submit" className="w-full shadow-lg shadow-blue-200">Submit Payment</Button>
                                </form>
                            </Card>
                        </div>

                        <div className="lg:col-span-2">
                            <Card title="Financial Report & Activity Log">
                                <div className="overflow-x-auto custom-scroll">
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-gray-50 text-gray-600 font-bold border-b">
                                            <tr>
                                                <th className="p-3">Member</th>
                                                <th className="p-3">Amount</th>
                                                <th className="p-3">Date</th>
                                                <th className="p-3">Receipt</th>
                                                <th className="p-3">Status</th>
                                                <th className="p-3 text-right">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {payments.map(p => {
                                                const member = users.find(u => u.id === p.userId);
                                                return (
                                                    <tr key={p.id} className={`border-b last:border-0 hover:bg-gray-50 transition-colors ${p.status === 'late' ? 'bg-red-50' : ''}`}>
                                                        <td className="p-3 font-medium text-gray-800">{member?.fullName}</td>
                                                        <td className="p-3 text-gray-600">{p.amount} Birr</td>
                                                        <td className="p-3 text-gray-500">{p.date}</td>
                                                        <td className="p-3 text-xs text-blue-600 truncate max-w-[150px]" title={p.receipt}>{p.receipt}</td>
                                                        <td className="p-3"><Badge status={p.status} /></td>
                                                        <td className="p-3 text-right">
                                                            <button onClick={() => deletePayment(p.id)} className="text-red-400 hover:text-red-600 p-2 hover:bg-red-50 rounded-full transition-colors" title="Delete Record">
                                                                <Trash2 size={16}/>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </Card>
                        </div>
                    </div>
                );
            };

            const ProfileView = () => {
                if(!currentUser) return null;
                const myPayments = payments.filter(p => p.userId === currentUser.id);
                const totalPaid = myPayments.reduce((sum, p) => sum + parseFloat(p.amount), 0);

                return (
                    <div className="max-w-4xl mx-auto space-y-6 fade-in">
                        <Card>
                            <div className="flex flex-col md:flex-row gap-8 items-start">
                                <div className="w-32 h-32 bg-gradient-to-br from-blue-500 to-blue-700 rounded-full flex items-center justify-center text-white text-4xl font-bold shadow-lg">
                                    {currentUser.fullName.charAt(0)}
                                </div>
                                <div className="flex-1 space-y-4">
                                    <div>
                                        <h2 className="text-3xl font-bold text-gray-800">{currentUser.fullName}</h2>
                                        <div className="mt-2"><Badge status={currentUser.role} /></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-6 pt-4 border-t border-gray-100">
                                        <div>
                                            <span className="text-xs font-bold text-gray-400 uppercase">Username</span>
                                            <p className="font-medium text-gray-700">{currentUser.username}</p>
                                        </div>
                                        <div>
                                            <span className="text-xs font-bold text-gray-400 uppercase">Total Contributed</span>
                                            <p className="font-bold text-green-600 text-xl">{totalPaid} Birr</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </Card>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <Card title="My Family Details">
                                <div className="space-y-3">
                                    <div className="flex justify-between p-3 bg-gray-50 rounded"><span className="font-semibold text-gray-600">Spouse:</span> <span className="text-gray-800">{currentUser.family?.spouse || '-'}</span></div>
                                    <div className="flex justify-between p-3 bg-gray-50 rounded"><span className="font-semibold text-gray-600">Father:</span> <span className="text-gray-800">{currentUser.family?.father || '-'}</span></div>
                                    <div className="flex justify-between p-3 bg-gray-50 rounded"><span className="font-semibold text-gray-600">Mother:</span> <span className="text-gray-800">{currentUser.family?.mother || '-'}</span></div>
                                    <div className="flex justify-between p-3 bg-gray-50 rounded"><span className="font-semibold text-gray-600">Siblings:</span> <span className="text-gray-800">{currentUser.family?.siblings || '-'}</span></div>
                                    <div className="p-3 bg-gray-50 rounded"><span className="font-semibold text-gray-600 block mb-1">Children:</span> <span className="text-gray-800">{currentUser.family?.children || '-'}</span></div>
                                </div>
                            </Card>

                            <Card title="My Payment History">
                                <div className="overflow-y-auto max-h-[300px] custom-scroll">
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-gray-50 sticky top-0"><tr><th className="p-2">Date</th><th className="p-2">Amount</th><th className="p-2">Status</th><th className="p-2">Receipt</th></tr></thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {myPayments.map(p => (
                                                <tr key={p.id}><td className="p-2 text-gray-600">{p.date}</td><td className="p-2 font-medium">{p.amount}</td><td className="p-2"><Badge status={p.status}/></td><td className="p-2 text-blue-600 text-xs truncate max-w-[80px]">{p.receipt}</td></tr>
                                            ))}
                                            {myPayments.length === 0 && <tr><td colSpan="4" className="p-4 text-center text-gray-400">No payments found.</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </Card>
                        </div>
                    </div>
                );
            };

            const HostingGuideView = () => (
                <div className="max-w-3xl mx-auto fade-in">
                    <Card title="How to Host This Database for Free">
                        <div className="prose text-gray-700 space-y-4 max-w-none">
                            <p className="bg-blue-50 p-4 rounded-lg border border-blue-100 text-blue-800">
                                <strong>Important:</strong> This application currently saves data in your browser's "Local Storage". 
                                To share this with your family members so everyone sees the same data, you need to host it online 
                                and connect it to a real database (like Firebase). 
                                Below are the steps to host the <strong>interface</strong> for free.
                            </p>
                            
                            <h3 className="text-lg font-bold text-gray-800 border-b pb-2">Step-by-Step Hosting Guide</h3>
                            
                            <ol className="list-decimal pl-5 space-y-4 marker:font-bold marker:text-blue-600">
                                <li>
                                    <strong>Save the Code:</strong> Copy the entire code of this page and save it as a file named <code>index.html</code> on your computer.
                                </li>
                                <li>
                                    <strong>Create a GitHub Account:</strong> Go to <a href="https://github.com" target="_blank" className="text-blue-600 underline font-medium">GitHub.com</a> and sign up (it's free).
                                </li>
                                <li>
                                    <strong>Create a Repository:</strong> 
                                    <ul className="list-disc pl-5 mt-1 text-sm text-gray-600">
                                        <li>Click the "+" icon in the top right and select "New repository".</li>
                                        <li>Name it something like <code>welifgiea-db</code>.</li>
                                        <li>Click "Create repository".</li>
                                        <li>Click "uploading an existing file" and upload your <code>index.html</code>.</li>
                                        <li>Click "Commit changes".</li>
                                    </ul>
                                </li>
                                <li>
                                    <strong>Deploy with Netlify (Easiest Method):</strong>
                                    <ul className="list-disc pl-5 mt-1 text-sm text-gray-600">
                                        <li>Go to <a href="https://www.netlify.com/" target="_blank" className="text-blue-600 underline font-medium">Netlify.com</a> and sign up.</li>
                                        <li>Click "Add new site" -> "Import an existing project".</li>
                                        <li>Choose "GitHub" and connect your account.</li>
                                        <li>Select the <code>welifgiea-db</code> repository you just created.</li>
                                        <li>Click "Deploy site".</li>
                                    </ul>
                                </li>
                                <li>
                                    <strong>Share the Link:</strong> Netlify will give you a link (e.g., <code>welifgiea.netlify.app</code>). Share this link with your family members.
                                </li>
                            </ol>
                            
                            <div className="bg-yellow-50 p-4 rounded border border-yellow-200 text-sm mt-6">
                                <strong className="text-yellow-800 block mb-1">Note on Data Synchronization:</strong>
                                Because this is a simple frontend demo, if Member A adds data on their phone, Member B won't see it on their computer unless you connect this to a backend database service like <strong>Firebase</strong> or <strong>Supabase</strong>. For a production social club database, hiring a developer to connect the backend is recommended.
                            </div>
                        </div>
                    </Card>
                </div>
            );

            // --- Main Layout ---

            if (view === 'login') return <LoginView />;

            const NavItem = ({ icon: Icon, label, targetView, active, allowedRoles }) => {
                if (allowedRoles && !allowedRoles.includes(currentUser.role) && currentUser.role !== 'admin') return null;
                
                return (
                    <button 
                        onClick={() => { setView(targetView); setSidebarOpen(false); }}
                        className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group ${active ? 'bg-blue-600 text-white shadow-md shadow-blue-200' : 'text-gray-600 hover:bg-blue-50 hover:text-blue-600'}`}
                    >
                        <Icon size={20} className={active ? 'text-white' : 'text-gray-400 group-hover:text-blue-600'} />
                        <span className="font-semibold">{label}</span>
                    </button>
                );
            };

            return (
                <div className="min-h-screen bg-slate-50 flex text-slate-800">
                    {/* Sidebar Mobile Overlay */}
                    {sidebarOpen && <div className="fixed inset-0 bg-black/50 z-40 lg:hidden backdrop-blur-sm" onClick={() => setSidebarOpen(false)}></div>}
                    
                    {/* Sidebar */}
                    <aside className={`fixed lg:static inset-y-0 left-0 w-72 bg-white border-r border-gray-200 transform transition-transform duration-300 z-50 flex flex-col ${sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
                        <div className="p-6 border-b border-gray-100 bg-gradient-to-r from-blue-600 to-blue-700 text-white">
                            <h1 className="text-2xl font-extrabold tracking-tight">welifGiea</h1>
                            <p className="text-blue-100 text-xs font-medium mt-1 opacity-80">Social Membership DB</p>
                        </div>
                        
                        <nav className="p-4 space-y-2 flex-1 overflow-y-auto">
                            <NavItem icon={Home} label="Dashboard" targetView="dashboard" active={view === 'dashboard'} />
                            
                            <div className="pt-4 pb-2">
                                <p className="px-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Management</p>
                            </div>
                            
                            {(currentUser.role === 'admin' || currentUser.role === 'registrar') && (
                                <NavItem icon={UserPlus} label="Register Member" targetView="register" active={view === 'register'} allowedRoles={['admin', 'registrar']} />
                            )}
                            
                            {(currentUser.role === 'admin' || currentUser.role === 'finance') && (
                                <NavItem icon={DollarSign} label="Finance & Reports" targetView="finance" active={view === 'finance'} allowedRoles={['admin', 'finance']} />
                            )}
                            
                            <div className="pt-4 pb-2">
                                <p className="px-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Personal</p>
                            </div>
                            
                            <NavItem icon={CreditCard} label="My Profile" targetView="profile" active={view === 'profile'} />
                            <NavItem icon={BookOpen} label="Hosting Guide" targetView="hosting" active={view === 'hosting'} />
                        </nav>
                        
                        <div className="p-4 border-t border-gray-100 bg-gray-50">
                            <button onClick={handleLogout} className="flex items-center gap-3 text-red-600 hover:bg-red-50 w-full px-4 py-3 rounded-xl transition-colors font-medium">
                                <LogOut size={18} /> Sign Out
                            </button>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col h-screen overflow-hidden">
                        <header className="bg-white/80 backdrop-blur-md border-b border-gray-200 p-4 flex items-center justify-between sticky top-0 z-30">
                            <div className="flex items-center gap-4">
                                <button className="lg:hidden p-2 text-gray-600 hover:bg-gray-100 rounded-lg" onClick={() => setSidebarOpen(true)}><Menu /></button>
                                <h2 className="text-xl font-bold text-gray-800 capitalize hidden sm:block">{view.replace('-', ' ')}</h2>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="text-right hidden sm:block">
                                    <p className="text-sm font-bold text-gray-800">{currentUser?.fullName}</p>
                                    <p className="text-xs text-gray-500 capitalize">{currentUser?.role}</p>
                                </div>
                                <div className="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-700 font-bold border-2 border-white shadow-sm">
                                    {currentUser?.fullName.charAt(0)}
                                </div>
                            </div>
                        </header>
                        
                        <div className="flex-1 overflow-auto p-4 lg:p-8 custom-scroll">
                            {view === 'dashboard' && <DashboardView />}
                            {view === 'register' && <MemberRegisterView />}
                            {view === 'finance' && <FinanceView />}
                            {view === 'profile' && <ProfileView />}
                            {view === 'hosting' && <HostingGuideView />}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
